<div class="dropdown guraify-lang-switcher">
    <button class="btn btn-sm dropdown-toggle guraify-lang-button" id="langDropdown" data-bs-toggle="dropdown"
        aria-expanded="false">
        {{ language|upper }}
    </button>

    <ul class="dropdown-menu dropdown-menu-end guraify-lang-menu" aria-labelledby="langDropdown">
        <li>
            <a class="dropdown-item {% if language == 'en' %}active{% endif %}" href="#" data-lang="en">EN</a>
        </li>
        <li>
            <a class="dropdown-item {% if language == 'es' %}active{% endif %}" href="#" data-lang="es">ES</a>
        </li>
        <li>
            <a class="dropdown-item {% if language == 'it' %}active{% endif %}" href="#" data-lang="it">IT</a>
        </li>
    </ul>
</div>
